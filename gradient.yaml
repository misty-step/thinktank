context:
    citations: required
    freshness: current-worktree
    permissions: public-safe
    retrieval:
        citations: required
        mode: assist
    sources:
        - kind: repo
          path: .
        - kind: docs
          path: ./docs
        - kind: evidence
          path: ./.gradient/evidence
description: ThinkTank's Gradient-managed governed work profile.
fleet:
    autonomy: operator_review
    backend: codex-local
    implementation: local-supervised
    mode: supervised
    run_root: .gradient/runs
harness:
    adoption_level: evidence
    agent_bridges:
        - .claude/agents
    agent_root: .agents/agents
    agents:
        - planner
        - builder
        - critic
        - ousterhout
        - carmack
        - beck
        - cooper
        - grug
        - repo-guide
    bridges:
        - .claude/skills
        - .codex/skills
        - .pi/skills
    default_budget: conservative
    implementation: gradient-native
    primitive_library:
        name: gradient-default
        path: .agents/skills
        role: bundled Gradient native primitives; ThinkTank-specific work modes defer to .agent/skills
        type: bundled
        version: 0.1.0
    profile: solo-frontier
    providers:
        - openai
        - anthropic
    repo_scan: .gradient/init/repo-scan.json
    shared_skill_root: .agents/skills
    skills:
        - gradient
        - research
        - groom
        - shape
        - implement
        - qa
        - demo
        - code-review
        - refactor
        - ci
        - diagnose
        - monitor
        - deliver
        - settle
        - ship
        - yeet
        - flywheel
        - harness
        - agent-readiness
        - gradient-contracts
        - zero-tech-debt
        - repo-workflow
    tailor_mode: fast
name: thinktank
policy:
    autonomy: supervised
    evals:
        runner: scripts/eval-gradient.sh
        suites:
            - solo-mvp
    evidence:
        repo_gate:
            command: gradient validate && ./scripts/with-colima.sh dagger call check
            required: true
            run_by_default: true
        retention: public-safe
        trace_backend: local
    evidence_required:
        - validation
        - evidence-packet
        - policy-outcome
    feedback_destination: .gradient/feedback
version: 0.1.0
work:
    adapter: backlog-d
    implementation: backlog.d
    requirements:
        acceptance_criteria: required
        closure_directory: backlog.d/_done
        durable_ids: true
    source: backlog.d
