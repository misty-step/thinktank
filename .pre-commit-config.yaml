repos:
# Secrets scanning - prevent accidental commits of API keys/tokens
-   repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.0
    hooks:
    -   id: gitleaks

# Basic file hygiene
-   repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
    -   id: trailing-whitespace
    -   id: end-of-file-fixer
    -   id: check-yaml

# Backlog state gate — prevent top-level items from being marked done pre-merge
-   repo: local
    hooks:
    -   id: backlog-state-gate
        name: backlog-state-gate
        entry: scripts/ci/backlog-state-gate.sh
        language: script
        files: ^backlog\.d/.*\.md$
        pass_filenames: true

# Elixir formatting — auto-apply locally before CI enforces formatting
-   repo: local
    hooks:
    -   id: mix-format
        name: mix-format
        entry: mix format
        language: system
        files: \.exs?$
        pass_filenames: true

# Elixir linting — catches style/complexity issues before commit
-   repo: local
    hooks:
    -   id: mix-credo
        name: mix-credo
        entry: mix credo --strict
        language: system
        files: \.exs?$
        pass_filenames: false

# Architecture gate — enforce repo-specific boundaries before local CI
-   repo: local
    hooks:
    -   id: architecture-gate
        name: architecture-gate
        entry: scripts/ci/architecture-gate.sh
        language: script
        files: \.exs?$
        pass_filenames: false

# Harness agent gate — repo-local personas define lenses, not models
-   repo: local
    hooks:
    -   id: harness-agent-gate
        name: harness-agent-gate
        entry: scripts/ci/harness-agent-gate.sh
        language: script
        files: ^\.claude/agents/.*\.md$
        pass_filenames: false

# Elixir model ID validation — prevents stale/deprecated model IDs
-   repo: local
    hooks:
    -   id: validate-elixir-models
        name: validate-elixir-models
        entry: scripts/validate-elixir-models.sh
        language: script
        files: \.ex$
        pass_filenames: false
