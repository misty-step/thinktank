repos:
# Secrets scanning - prevent accidental commits of API keys/tokens
-   repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.0
    hooks:
    -   id: gitleaks

# Basic file hygiene
-   repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
    -   id: trailing-whitespace
    -   id: end-of-file-fixer
    -   id: check-yaml

# Elixir formatting — mirrors CI `mix format --check-formatted`
-   repo: local
    hooks:
    -   id: mix-format
        name: mix-format
        entry: mix format --check-formatted
        language: system
        files: \.exs?$
        pass_filenames: false

# Elixir model ID validation — prevents stale/deprecated model IDs
-   repo: local
    hooks:
    -   id: validate-elixir-models
        name: validate-elixir-models
        entry: scripts/validate-elixir-models.sh
        language: script
        files: \.ex$
        pass_filenames: false
