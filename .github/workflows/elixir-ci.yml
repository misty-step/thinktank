name: Elixir CI

on: [push, pull_request]

permissions:
  contents: read

jobs:
  local-first:
    name: Local-First CI
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Seed repo env file
        run: cp .env.example .env

      - name: Run Dagger local CI
        uses: dagger/dagger-for-github@v8.3.0
        with:
          version: "0.20.3"
          verb: call
          module: .
          args: check
