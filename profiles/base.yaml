name: base
version: 0.1.0
description: Public-safe baseline profile for Gradient.

harness:
  implementation: gradient-native
  primitive_library:
    name: gradient-default
    type: bundled
    version: 0.1.0
    path: .agents/skills
  required_skills: []
  allowed_providers: []
  default_budget: conservative

work:
  implementation: orbital
  aliases:
    - work-adapter-prototype
  adapter: orbital-mcp
  requirements:
    durable_ids: true
    status_transitions: true

fleet:
  implementation: olympus
  backend: olympus
  autonomy: supervised

policy:
  approvals:
    code_changes: required
    external_side_effects: required
  secrets:
    secret_manager: external
    secret_access_log: external_reference_required
    rotation_required: deployment_defined
    machine_identity_required: deployment_defined
    secret_values_logged: forbidden
  supply_chain:
    package_manager: deployment_defined
    lockfile: required_when_runtime_exists
    frozen_installs: required_when_ci_exists
    lifecycle_scripts: reviewed
  evidence:
    trace_backend: local
    retention: public-safe
    tests: required
    verification_commands: required
    review_summary: required

context:
  citations: required
  freshness: warn_on_stale
  permissions: local_only
