version: 1

defaults:
  agent:
    thinking_level: medium

providers:
  openrouter:
    adapter: openrouter
    credential_env: THINKTANK_OPENROUTER_API_KEY
    defaults:
      fallback_env: OPENROUTER_API_KEY

agents:
  systems:
    provider: openrouter
    model: anthropic/claude-sonnet-4.6
    tools: [bash, read, grep, find, ls]

  verification:
    provider: openrouter
    model: arcee-ai/trinity-large-thinking
    tools: [bash, read, grep, find, ls]

  ml:
    provider: openrouter
    model: x-ai/grok-4.1-fast
    tools: [bash, read, grep, find, ls]

  dx:
    provider: openrouter
    model: google/gemini-3-flash-preview
    tools: [bash, read, grep, find, ls]
    thinking_level: low

  trace:
    provider: openrouter
    model: x-ai/grok-4.20
    tools: [bash, read, grep, find, ls]
    thinking_level: high
    retries: 2
    metadata:
      review_role: correctness

  guard:
    provider: openrouter
    model: x-ai/grok-4.20
    tools: [bash, read, grep, find, ls]
    thinking_level: high
    retries: 2
    metadata:
      review_role: security

  atlas:
    provider: openrouter
    model: openai/gpt-5.4-mini
    tools: [bash, read, grep, find, ls]
    thinking_level: high
    retries: 2
    metadata:
      review_role: architecture

  proof:
    provider: openrouter
    model: openai/gpt-5.4-mini
    tools: [bash, read, grep, find, ls]
    thinking_level: high
    retries: 2
    metadata:
      review_role: tests

  vector:
    provider: openrouter
    model: z-ai/glm-5.1
    tools: [bash, read, grep, find, ls]
    thinking_level: high
    retries: 2
    metadata:
      review_role: interfaces

  pulse:
    provider: openrouter
    model: minimax/minimax-m2.7
    tools: [bash, read, grep, find, ls]
    thinking_level: high
    retries: 2
    metadata:
      review_role: runtime-risk

  scout:
    provider: openrouter
    model: google/gemini-3-flash-preview
    tools: [bash, read, grep, find, ls]
    thinking_level: high
    retries: 2
    metadata:
      review_role: integration

  forge:
    provider: openrouter
    model: inception/mercury-2
    tools: [bash, read, grep, find, ls]
    thinking_level: high
    retries: 2
    metadata:
      review_role: implementation

  orbit:
    provider: openrouter
    model: moonshotai/kimi-k2.6
    tools: [bash, read, grep, find, ls]
    thinking_level: high
    retries: 2
    metadata:
      review_role: compatibility

  sentry:
    provider: openrouter
    model: xiaomi/mimo-v2-pro
    tools: [bash, read, grep, find, ls]
    thinking_level: high
    retries: 2
    metadata:
      review_role: operability

  marshal:
    provider: openrouter
    model: openai/gpt-5.4
    tools: [bash, read, grep, find, ls]
    thinking_level: high
    retries: 2
    metadata:
      review_role: planner

  research-synth:
    provider: openrouter
    model: openai/gpt-5.4
    tools: [read, ls]

  review-synth:
    provider: openrouter
    model: openai/gpt-5.4
    tools: [read, ls]
    thinking_level: high
    retries: 2

benches:
  research/quick:
    kind: research
    description: >
      Launch a fast repo-aware research bench without a synthesizer for quick
      local grounding.
    agents: [systems, verification]
    concurrency: 2

  research/default:
    kind: research
    description: >
      Launch a fixed research bench of Pi agents and optionally synthesize
      their findings.
    structured_findings: true
    agents: [systems, verification, ml, dx]
    synthesizer: research-synth
    concurrency: 4

  review/default:
    kind: review
    description: >
      Launch the review bench: marshal plans, selects reviewers from the full
      roster, then synthesizes.
    agents: [trace, guard, atlas, proof, vector, pulse, scout, forge, orbit, sentry]
    planner: marshal
    synthesizer: review-synth
    concurrency: 10
    default_task: Review the current change and report only real issues with evidence.
