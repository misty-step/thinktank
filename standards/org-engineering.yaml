id: org-engineering
version: 0.1.0
description: Public-safe baseline for engineering teams adopting Gradient.
baseline_standards:
  - public-safe-boundary
  - lifecycle-evidence
  - cited-context
  - supervised-local-fleet
policy_packs:
  - public-safe
  - evidence-required
  - security-defaults
  - trace-reference-boundary
harness_packs:
  - codex-primary
  - claude-code-compatible
  - filesystem-skills
evidence_contracts:
  - supervised-local-code-change
  - harness-change
  - policy-change
exception_policy:
  adapter: backlog.d
  required_fields:
    - owner
    - reason
    - expires_at
    - approver
    - risk
  expiry_required: true
  approval_required: true
